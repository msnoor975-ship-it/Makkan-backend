services:
  postgres:
    image: postgres:16
    container_name: suz-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: suz
    volumes:
      - suz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d suz']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  suz_postgres_data:
